name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag name, e.g. v3.16.3-claude-oauth.2"
        required: true
        default: "v3.16.3-claude-oauth.2"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSI
            os: windows-2022
            bundle: msi
            artifact_name: windows-msi
          - name: Ubuntu DEB
            os: ubuntu-22.04
            bundle: deb
            artifact_name: ubuntu-deb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            xdg-utils
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri package without updater signing
        shell: bash
        run: |
          set -euo pipefail
          CONFIG_PATH="$RUNNER_TEMP/tauri.release.json"
          node - "$CONFIG_PATH" <<'NODE'
          const fs = require('fs');
          const path = process.argv[2];
          const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          config.bundle = config.bundle || {};
          config.bundle.createUpdaterArtifacts = false;
          fs.writeFileSync(path, JSON.stringify(config, null, 2));
NODE
          pnpm tauri build --bundles "${{ matrix.bundle }}" --config "$CONFIG_PATH"

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          mkdir -p release-assets

          if [ "${{ runner.os }}" = "Windows" ]; then
            ASSET=$(find src-tauri/target/release/bundle -name "*.msi" -type f | head -1 || true)
            if [ -z "$ASSET" ]; then
              echo "No .msi found" >&2
              find src-tauri/target -maxdepth 6 -type f | sort >&2 || true
              exit 1
            fi
            cp "$ASSET" "release-assets/CC-Switch-${TAG_NAME}-Windows.msi"
          else
            ASSET=$(find src-tauri/target/release/bundle -name "*.deb" -type f | head -1 || true)
            if [ -z "$ASSET" ]; then
              echo "No .deb found" >&2
              find src-tauri/target -maxdepth 6 -type f | sort >&2 || true
              exit 1
            fi
            cp "$ASSET" "release-assets/CC-Switch-${TAG_NAME}-Linux-x86_64.deb"
          fi

          ls -lh release-assets

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: CC Switch ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          prerelease: true
          make_latest: true
          body: |
            # CC Switch ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

            Claude Code 官方订阅多账号切换增强版。

            ## 下载

            - Windows：下载 `.msi` 安装包，双击安装。
            - Ubuntu / Debian：下载 `.deb` 安装包，然后执行：

              ```bash
              sudo apt install -y ./xxx.deb
              ```

            ## 使用提示

            切换 Claude 官方账号前，建议先关闭正在运行的 Claude Code，避免运行中同时读写 `~/.claude/.credentials.json`。
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
